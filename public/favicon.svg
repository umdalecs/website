<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Neon gradients matching the website's color palette -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" /> <!-- Electric Neon Blue -->
      <stop offset="50%" stop-color="#bf5af2" /> <!-- Electric Neon Purple -->
      <stop offset="100%" stop-color="#ff2e93" /> <!-- Electric Neon Pink -->
    </linearGradient>
    
    <!-- Glow filter for that neon aesthetic -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Modern squircle container with dark background and neon border -->
  <rect width="500" height="500" x="6" y="6" rx="120" fill="#0d0e15" stroke="url(#neonGradient)" stroke-width="12" />

  <!-- Code Brackets enclosing the letter A (representing Alejandro + Developer) -->
  <g filter="url(#glow)">
    <!-- Left bracket: < -->
    <path d="M130 180 L60 256 L130 332" stroke="url(#neonGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Stylized coding letter A -->
    <path d="M205 350 L256 162 L307 350" stroke="url(#neonGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M222 290 L290 290" stroke="url(#neonGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Right bracket: > -->
    <path d="M382 180 L452 256 L382 332" stroke="url(#neonGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
